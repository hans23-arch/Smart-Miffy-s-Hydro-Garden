<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Fredoka',system-ui,sans-serif}
  body{min-height:100vh;background:linear-gradient(180deg,#bfe4f7 0%,#bfe4f7 70%,#7cc77a 70%,#7cc77a 100%);overflow-x:hidden;position:relative}
  .sun{position:absolute;top:32px;right:64px;width:80px;height:80px;border-radius:50%;background:#ffdd57;box-shadow:0 0 40px rgba(255,221,87,.6)}
  .cloud{position:absolute;color:white}
  .c1{top:80px;right:128px}.c2{top:160px;right:32px}.c3{top:224px;left:40px}
  .bird{position:absolute;animation:fly 6s ease-in-out infinite}
  .b1{top:60px;left:30%}.b2{top:110px;left:50%;animation-delay:-2s}
  .b3{top:80px;left:72%;animation-delay:-4s}.b4{top:200px;left:82%;animation-delay:-1s}
  @keyframes fly{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .balloon{position:absolute;top:-16px;left:-16px;cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1);transform-origin:90px 215px;animation:sway 5s ease-in-out infinite}
  .balloon:hover{filter:brightness(1.05)}
  .balloon.squish{animation:squish .4s ease}
  @keyframes sway{0%,100%{transform:translate(0,0) rotate(-2deg)}50%{transform:translate(10px,4px) rotate(2deg)}}
  @keyframes squish{0%{transform:scale(1,1)}40%{transform:scale(1.15,.78)}70%{transform:scale(.92,1.1)}100%{transform:scale(1,1)}}
  .hills{position:absolute;bottom:0;left:0;width:100%;height:200px}
  .container{position:relative;z-index:10;max-width:1024px;margin:0 auto;padding:32px 16px 48px}
  .roof-wrap{position:relative;height:240px}
  .chimney{position:absolute;left:18%;top:8px;width:40px;height:140px;background:#ee7a3b;border-radius:3px}
  .smoke{position:absolute;left:22%;top:0}
  .roof{position:absolute;inset:auto 0 0 0;height:230px;background:#5b6ee8;clip-path:polygon(50% 0%,0% 100%,100% 100%)}
  .window{position:absolute;left:50%;transform:translateX(-50%);bottom:40px;width:80px;height:80px;border-radius:50%;background:white;border:4px solid white;box-shadow:0 4px 6px rgba(0,0,0,.1);overflow:hidden;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
  .window>div:nth-child(1),.window>div:nth-child(4){background:#bfe4f7}
  .body{display:grid;grid-template-columns:1fr 1fr;border-radius:0 0 8px 8px;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
  .panel{padding:32px;min-height:280px;display:flex;flex-direction:column}
  .panel h2{color:white;font-size:2.25rem;font-weight:800;text-align:center;letter-spacing:.05em;text-shadow:2px 3px 0 rgba(0,0,0,.2)}
  .pump{background:#8bc34a}.temp{background:#f7c3d0}.hum{background:#ffdd57}.bun{background:#ee7a3b}
  .toggle{position:relative;width:224px;height:80px;border-radius:9999px;border:none;cursor:pointer;transition:background .3s;box-shadow:inset 0 2px 4px rgba(0,0,0,.2);margin:auto}
  .toggle.on{background:#4a8b1f}.toggle.off{background:#3d6d1a}
  .knob{position:absolute;top:8px;width:64px;height:64px;border-radius:50%;background:white;box-shadow:0 4px 6px rgba(0,0,0,.2);transition:left .3s}
  .toggle.on .knob{left:8px}.toggle.off .knob{left:calc(100% - 72px)}
  .lbl{position:absolute;color:white;font-weight:800;font-size:1.5rem;top:50%;transform:translateY(-50%);text-shadow:1px 2px 0 rgba(0,0,0,.25);transition:all .3s}
  .toggle.on .lbl{right:20px}.toggle.off .lbl{left:20px}
  .reading{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:24px}
  .num{color:white;font-size:4.5rem;font-weight:800;text-shadow:2px 3px 0 rgba(0,0,0,.15);line-height:1}
  input[type=range]{width:100%;margin-top:24px}
  .bar{width:100%;height:20px;border-radius:9999px;background:rgba(255,255,255,.6);border:2px solid white;overflow:hidden;margin-top:24px}
  .bar>div{height:100%;background:#5b6ee8;transition:width .3s;border-radius:9999px}
  .bunnies{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:100%;margin-bottom:-8px}
</style>
</head>
<body>
  <div class="sun"></div>
  <svg class="cloud c1" width="120" height="50" viewBox="0 0 120 50" fill="white"><ellipse cx="30" cy="30" rx="22" ry="18"/><ellipse cx="60" cy="22" rx="28" ry="22"/><ellipse cx="90" cy="30" rx="22" ry="18"/></svg>
  <svg class="cloud c2" width="120" height="50" viewBox="0 0 120 50" fill="white"><ellipse cx="30" cy="30" rx="22" ry="18"/><ellipse cx="60" cy="22" rx="28" ry="22"/><ellipse cx="90" cy="30" rx="22" ry="18"/></svg>
  <svg class="cloud c3" width="120" height="50" viewBox="0 0 120 50" fill="white"><ellipse cx="30" cy="30" rx="22" ry="18"/><ellipse cx="60" cy="22" rx="28" ry="22"/><ellipse cx="90" cy="30" rx="22" ry="18"/></svg>
  <svg class="bird b1" width="50" height="22" viewBox="0 0 50 22" fill="none" stroke="#3a78a8" stroke-width="3" stroke-linecap="round"><path d="M4 16 Q14 4 24 16 Q34 4 46 16"/></svg>
  <svg class="bird b2" width="50" height="22" viewBox="0 0 50 22" fill="none" stroke="#3a78a8" stroke-width="3" stroke-linecap="round"><path d="M4 16 Q14 4 24 16 Q34 4 46 16"/></svg>
  <svg class="bird b3" width="50" height="22" viewBox="0 0 50 22" fill="none" stroke="#3a78a8" stroke-width="3" stroke-linecap="round"><path d="M4 16 Q14 4 24 16 Q34 4 46 16"/></svg>
  <svg class="bird b4" width="50" height="22" viewBox="0 0 50 22" fill="none" stroke="#3a78a8" stroke-width="3" stroke-linecap="round"><path d="M4 16 Q14 4 24 16 Q34 4 46 16"/></svg>
  <svg class="balloon" id="balloon" width="180" height="240" viewBox="0 0 180 240" fill="none" onclick="this.classList.remove('squish');void this.offsetWidth;this.classList.add('squish')">
    <path d="M90 10 C40 10 20 60 20 95 C20 130 60 160 90 160 C120 160 160 130 160 95 C160 60 140 10 90 10 Z" fill="#ee7a3b"/>
    <path d="M60 15 C50 40 50 130 70 158 L90 160 L90 10 Z" fill="#ffdd57"/>
    <path d="M120 15 C130 40 130 130 110 158 L90 160 L90 10 Z" fill="#7cc77a"/>
    <rect x="75" y="160" width="30" height="6" fill="#333"/>
    <line x1="78" y1="166" x2="72" y2="200" stroke="#333" stroke-width="2"/>
    <line x1="102" y1="166" x2="108" y2="200" stroke="#333" stroke-width="2"/>
    <rect x="68" y="200" width="44" height="28" rx="4" fill="#7a4a2b"/>
  </svg>
  <svg class="hills" viewBox="0 0 1200 200" preserveAspectRatio="none" fill="#5fa85d"><ellipse cx="200" cy="200" rx="300" ry="120"/><ellipse cx="1000" cy="200" rx="350" ry="140"/></svg>

  <div class="container">
    <div class="roof-wrap">
      <div class="chimney"></div>
      <svg class="smoke" width="60" height="60" viewBox="0 0 60 60" fill="none"><path d="M10 50 Q20 30 30 40 T50 20" stroke="#3a78a8" stroke-width="3" stroke-linecap="round" fill="none"/></svg>
      <div class="roof"></div>
      <div class="window"><div></div><div></div><div></div><div></div></div>
    </div>
    <div class="body">
      <div class="panel pump">
        <h2>PUMP WATER</h2>
        <button id="toggle" class="toggle on" onclick="togglePump()"><span class="knob"></span><span class="lbl" id="lbl">ON</span></button>
      </div>
      <div class="panel temp">
        <h2>TEMPERATURE</h2>
        <div class="reading">
          <svg width="70" height="110" viewBox="0 0 70 110" fill="none">
            <rect x="22" y="6" width="20" height="70" rx="10" fill="white" stroke="black" stroke-width="3"/>
            <rect x="26" y="20" width="12" height="55" fill="#e63946"/>
            <circle cx="32" cy="88" r="16" fill="#e63946" stroke="black" stroke-width="3"/>
            <line x1="46" y1="24" x2="58" y2="24" stroke="black" stroke-width="3" stroke-linecap="round"/>
            <line x1="46" y1="36" x2="58" y2="36" stroke="black" stroke-width="3" stroke-linecap="round"/>
            <line x1="46" y1="48" x2="58" y2="48" stroke="black" stroke-width="3" stroke-linecap="round"/>
            <line x1="46" y1="60" x2="58" y2="60" stroke="black" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <div class="num"><span id="tempVal">35</span>°C</div>
        </div>
        <input type="range" min="0" max="50" value="35" oninput="document.getElementById('tempVal').textContent=this.value"/>
      </div>
      <div class="panel hum">
        <h2>HUMIDITY</h2>
        <div class="reading">
          <div class="num"><span id="humVal">75</span>%</div>
          <svg width="80" height="100" viewBox="0 0 80 100" fill="none">
            <path d="M40 8 C40 8 10 45 10 65 A30 30 0 0 0 70 65 C70 45 40 8 40 8 Z" stroke="white" stroke-width="5" fill="none"/>
            <circle cx="30" cy="58" r="5" fill="white"/><circle cx="50" cy="72" r="5" fill="white"/>
            <line x1="52" y1="55" x2="28" y2="75" stroke="white" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="bar"><div id="humBar" style="width:75%"></div></div>
        <input type="range" min="0" max="100" value="75" oninput="document.getElementById('humVal').textContent=this.value;document.getElementById('humBar').style.width=this.value+'%'"/>
      </div>
      <div class="panel bun">
        <div class="bunnies" id="bunnies"></div>
      </div>
    </div>
  </div>

<script>
function togglePump(){const t=document.getElementById('toggle');const on=t.classList.contains('on');t.classList.toggle('on',!on);t.classList.toggle('off',on);document.getElementById('lbl').textContent=on?'OFF':'ON';}
function bunny(body,fur,inner){return `<svg width="150" height="230" viewBox="0 0 150 230" fill="none">
  <ellipse cx="52" cy="38" rx="14" ry="36" fill="${fur}"/><ellipse cx="98" cy="38" rx="14" ry="36" fill="${fur}"/>
  <ellipse cx="52" cy="42" rx="6" ry="24" fill="${inner}"/><ellipse cx="98" cy="42" rx="6" ry="24" fill="${inner}"/>
  <ellipse cx="75" cy="95" rx="52" ry="48" fill="${fur}"/>
  <path d="M67 108 L83 122 M83 108 L67 122" stroke="#222" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M22 165 Q75 140 128 165 L128 230 L22 230 Z" fill="${body}"/>
  <ellipse cx="75" cy="148" rx="22" ry="8" fill="rgba(0,0,0,0.05)"/>
</svg>`;}
document.getElementById('bunnies').innerHTML=bunny('#3a78a8','#ffffff','#f5c0c0')+bunny('#ffffff','#7a4a2b','rgba(0,0,0,0.15)')+bunny('#ffdd57','#ffffff','#f5c0c0');
</script>
</body>
</html>
